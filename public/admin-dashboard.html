<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Dashboard</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>

<header>

    <h1>Hospital Dashboard</h1>

    <nav>
        <a href="index.html">Home</a>
        <a href="admin-login.html">Logout</a>
    </nav>

</header>

<main>

    <h2>Booked Appointments</h2>

    <table border="1" width="100%" cellpadding="10" cellspacing="0">

        <thead>
            <tr>
                <th>Booking ID</th>
                <th>Patient Name</th>
                <th>Phone</th>
                <th>Hospital</th>
                <th>Doctor</th>
                <th>Date</th>
                <th>Time</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
        </thead>

        <tbody id="appointmentTable">

        </tbody>

    </table>

    <div class="page-navigation">
        <button onclick="window.location.href='admin-login.html'">
            ⬅ Back
        </button>
    </div>

</main>

<script>

let appointments = JSON.parse(localStorage.getItem("appointments")) || [];

const table = document.getElementById("appointmentTable");

displayAppointments();

function displayAppointments() {

    table.innerHTML = "";

    if (appointments.length === 0) {

        table.innerHTML = `
        <tr>
            <td colspan="9">No Appointments Found</td>
        </tr>
        `;
        return;
    }

    appointments.forEach((appointment, index) => {

        table.innerHTML += `

        <tr>

            <td>${appointment.bookingNumber}</td>

            <td>${appointment.patientName}</td>

            <td>${appointment.phone || "-"}</td>

            <td>${appointment.hospital || "-"}</td>

            <td>${appointment.doctor}</td>

            <td>${appointment.appointmentDate}</td>

            <td>${appointment.appointmentTime || "-"}</td>

            <td>${appointment.status}</td>

            <td>
                ${
                    appointment.status === "Confirmed ✅"
                    ? "✔ Confirmed"
                    : `<button onclick="confirmAppointment(${index})">Confirm</button>`
                }
            </td>

        </tr>

        `;

    });

}

function confirmAppointment(index) {

    appointments[index].status = "Confirmed ✅";

    localStorage.setItem(
        "appointments",
        JSON.stringify(appointments)
    );

    displayAppointments();

}

</script>

<script src="js/app.js"></script>

<script>
if ("serviceWorker" in navigator) {
    window.addEventListener("load", function () {
        navigator.serviceWorker
            .register("service-worker.js")
            .then(function () {
                console.log("Service Worker Registered");
            })
            .catch(function (error) {
                console.log("Service Worker Registration Failed:", error);
            });
    });
}
</script>

</body>
</html>
