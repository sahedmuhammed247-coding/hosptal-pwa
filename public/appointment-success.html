<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appointment Confirmation</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>

<header>
    <h1>Hospital Appointment Booking System</h1>
</header>

<main>

    <h2>✅ Appointment Booked Successfully</h2>

    <div class="receipt">

        <p><strong>Booking Number:</strong> <span id="bookingNumber"></span></p>

        <p><strong>Patient Name:</strong> <span id="patientName"></span></p>

        <p><strong>Phone Number:</strong> <span id="phone"></span></p>

        <p><strong>Hospital:</strong> <span id="hospital"></span></p>

        <p><strong>Doctor Name:</strong> <span id="doctor"></span></p>

        <p><strong>Appointment Date:</strong> <span id="appointmentDate"></span></p>

        <p><strong>Appointment Time:</strong> <span id="appointmentTime"></span></p>

        <p><strong>Status:</strong> <span style="color:orange;">Pending</span></p>

        <p style="color:red;">
            Please arrive 15 minutes before your appointment.
        </p>

        <br>

        <button onclick="window.print()">Print Appointment</button>

        <button onclick="window.location.href='dashboard.html'">
            Back to Dashboard
        </button>

        <button onclick="window.location.href='index.html'">
            Home
        </button>

    </div>

</main>

<script>
document.addEventListener("DOMContentLoaded", function () {

    document.getElementById("bookingNumber").textContent =
        localStorage.getItem("bookingNumber") || "Not Available";

    document.getElementById("patientName").textContent =
        localStorage.getItem("patientName") || "Not Available";

    document.getElementById("phone").textContent =
        localStorage.getItem("phone") || "Not Available";

    document.getElementById("hospital").textContent =
        localStorage.getItem("hospital") || "Not Available";

    document.getElementById("doctor").textContent =
        localStorage.getItem("doctor") || "Not Available";

    document.getElementById("appointmentDate").textContent =
        localStorage.getItem("appointmentDate") || "Not Available";

    document.getElementById("appointmentTime").textContent =
        localStorage.getItem("appointmentTime") || "Not Available";

});
</script>

<script src="js/app.js"></script>

<script>
if ("serviceWorker" in navigator) {
    window.addEventListener("load", function () {
        navigator.serviceWorker
            .register("service-worker.js")
            .then(function () {
                console.log("Service Worker Registered");
            })
            .catch(function (error) {
                console.log("Service Worker Registration Failed:", error);
            });
    });
}
</script>

</body>
</html>
