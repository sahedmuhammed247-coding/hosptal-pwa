<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Hospital Appointment Booking System</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>

<header>
    <h1>Hospital Appointment Booking System</h1>

    <nav>
        <a href="index.html">Home</a>
        <a href="register.html">Register</a>
        <a href="login.html">Patient Login</a>
        <a href="admin-login.html">Hospital Login</a>
    </nav>
</header>

<main>

    <h2>Welcome</h2>

    <p>
        Book appointments with experienced doctors quickly and securely.
    </p>

    <button onclick="window.location.href='register.html'">
        Register
    </button>

    <button onclick="window.location.href='login.html'">
        Patient Login
    </button>

    <button onclick="window.location.href='admin-login.html'">
        Hospital Login
    </button>

</main>

<footer>
    <p>&copy; 2026 Hospital Appointment Booking System</p>
</footer>

<script src="js/app.js"></script>

<script>
if ("serviceWorker" in navigator) {
    window.addEventListener("load", function () {
        navigator.serviceWorker
            .register("service-worker.js")
            .then(function () {
                console.log("Service Worker Registered");
            })
            .catch(function (error) {
                console.log("Service Worker Registration Failed:", error);
            });
    });
}
</script>

</body>
</html>
